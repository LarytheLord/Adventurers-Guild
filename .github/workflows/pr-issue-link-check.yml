name: PR Issue Link Check

on:
  pull_request:
    branches: [main, development]
    types: [opened, edited, reopened, synchronize]

jobs:
  require-closing-reference:
    name: Require closing issue reference
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title/body contains a closing keyword
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const text = [pr.title || "", pr.body || ""].join("\n");
            const closingPattern = /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\b[:\s]+(?:issue\s+)?(?:(?:#\d+)|(?:https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+))/i;

            if (!closingPattern.test(text)) {
              core.setFailed(
                "PRs must include a closing issue reference like 'Closes #123' so GitHub can track and credit the contribution."
              );
            }
